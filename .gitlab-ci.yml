stages:
  - lint
  - test
  - deploy

default:
  image: python:3.11-slim
  cache:
    key:
      files:
        - requirements-dev.txt
    paths:
      - .cache/pip
  before_script:
    - pip install --cache-dir .cache/pip -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check .

test:
  stage: test
  variables:
    USE_FAKE_EMBEDDINGS: "true"
  script:
    - pytest -v

docker-build:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  cache: []
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

deploy-huggingface:
  stage: deploy
  image: alpine:3.20
  cache: []
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - git push -f "https://hf:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE:-job-hunting-rag}" "HEAD:main"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $HF_TOKEN'

deploy-cloudflare:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  cache: []
  variables:
    # wrangler reads CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID from the environment
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - apk add --no-cache nodejs npm
    - npm install
  script:
    - npx wrangler deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CLOUDFLARE_API_TOKEN'
